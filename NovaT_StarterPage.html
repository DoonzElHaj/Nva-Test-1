<!DOCTYPE html>
<html>
<head>
  <title>Nova Test Site - Start Page</title>
  <style>
    .page {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      color: rgba(168, 12, 12);
      font-size: 36px;
    }

    p {
      color: rgb(85, 81, 81);
      font-family: Verdana, sans-serif;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgb(168, 12, 12);
      padding: 10px 20px;
    }

    .navbar .logo {
      color: #fff;
      font-size: 20px;
      font-weight: bold;
    }

    .navbar .links a {
      color: #fff;
      text-decoration: none;
      margin-left: 20px;
      font-family: Verdana, sans-serif;
    }

    .navbar .links a:hover {
      text-decoration: underline;
    }

    .info-box {
      width: 500px;
      padding: 20px;
      border: 5px solid rgb(168, 12, 12);
      margin: 30px auto;
      background-color: #fff;
    }

    .hero {
      padding: 40px;
      background: #afa8a8;
    }

    .hero-buttons {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    button {
      background-color: rgb(168, 12, 12);
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
      margin: 5px;
    }

    button:hover {
      background-color: rgb(112, 12, 12);
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Nova Test Site</h1>
    <p>Beginner Guide to Model Rocketry</p>

    <!-- Navbar -->
    <div class="navbar">
      <div class="logo">Nova-TestSite-1</div>
      <div class="links">
        <a href="NovaT_StartPage.html">Home</a>
        <a href="NovaT_Contact.html">Contact</a>
        <a href="NovaT_Projects.html">Projects</a>
      </div>
    </div>

    <!-- Info box -->
    <div class="info-box">
      A 2026 project that plans to launch a model rocket 100 meters in the air.
    </div>

    <!-- Hero section -->
    <div class="hero">
      <h1>Nova Test Site - 1</h1>
      <p>First responsive section of the Nova Test Site project.</p>
      <div class="hero-buttons">
        <a href="NovaT_Projects.html"><button>Learn More</button></a>
        <a href="NovaT_Contact.html"><button>Contact Us</button></a>
      </div>
    </div>
  </div>
</body>
</html>
