<!DOCTYPE html>
<html>
<head>
  <style>
    h1 {
        color: rgba(168, 12, 12);
        font-size: 36px;
        text-align: center;
    }

    p {
        color: gray;
        font-family: Verdana, sans-serif;
        text-align: center;
    }
    
    div {
      width: 200px;
      padding: 20px;
      border: 5px solid rgb(168, 12, 12);
      margin: 30px;
      background-color: rgb(112, 112, 107);
    }

    .container {
      display: flex;
      justify-content: center;   /* centers horizontally */
      align-items: center;       /* centers vertically */
      min-height: 50vh;          /* half the viewport height */
      background: lightgray;
    }

    .box {
      width: 50%;
      max-width: 300px;
      height: auto;
      background: lightblue;
      text-align: center;
      padding: 20px;
    }

    /* Hero section */
    .hero {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 40px;
      background: #eee;
    }

    .text, .image {
      flex: 1;
      padding: 20px;
    }

    .image {
      display: flex;
      justify-content: center;
    }

    /* Responsive rule for mobile */
    @media (max-width: 600px) {
      .navbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .navbar .links {
        margin-top: 10px;
        display: flex;
        flex-direction: column;
      }

      .navbar .links a {
        margin: 5px 0;
      }

      .hero {
        flex-direction: column;
        text-align: center;
      }

      .hero-buttons {
        flex-direction: column;
      }

      .hero-buttons button {
        margin: 10px 0;
      }
    }

    .navbar {
      display: flex;
      justify-content: space-between; /* logo on left, links on right */
      align-items: center;
      background-color: rgb(168, 12, 12);
      padding: 10px 20px;
    }

    .navbar .logo {
      color: white;
      font-size: 20px;
      font-weight: bold;
    }

    .navbar .links a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-family: Verdana, sans-serif;
    }

    .navbar .links a:hover {
      text-decoration: underline;
    }

    /* Button styling (same as your original) */
    button {
      background-color: rgb(168, 12, 12); /* red background */
      color: white;                       /* white text */
      border: none;                       /* remove default border */
      padding: 10px 20px;                 /* spacing inside */
      font-size: 16px;
      cursor: pointer;                    /* pointer on hover */
      border-radius: 5px;                 /* rounded corners */
      margin: 5px;
    }

    button:hover {
      background-color: rgb(112, 12, 12); /* darker red on hover */
    }

    .hero-buttons {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo">Nova-TestSite-1</div>
    <div class="links">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>
  </div>

  <div>This is a box model</div>
  <h1>Nova test website</h1>
  <p>This is styled text.</p>

  <div class="container">
    <div class="box">Centered Box</div>
  </div>

  <!-- Hero section -->
  <div class="hero">
    <div class="text">
      <h1>Welcome to Nova-TestSite-1</h1>
      <p>This is my first responsive section!</p>
      <!-- Buttons inside hero -->
      <div class="hero-buttons">
        <button>Learn More</button>
        <button>Contact Us</button>
      </div>
    </div>
    <div class="image">
      <div class="box">Image Placeholder</div>
    </div>
  </div>
</body>
</html>
